name: Update major version tag

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  update-major-tag:
    name: Update major version tag
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine major version tag
        id: version
        shell: bash
        run: |
          set -euo pipefail

          FULL_TAG="${GITHUB_REF_NAME}"

          if [[ ! "$FULL_TAG" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            echo "Tag '$FULL_TAG' is not a semantic version."
            exit 1
          fi

          MAJOR_TAG="v${BASH_REMATCH[1]}"

          echo "full_tag=$FULL_TAG" >> "$GITHUB_OUTPUT"
          echo "major_tag=$MAJOR_TAG" >> "$GITHUB_OUTPUT"

          echo "Full tag : $FULL_TAG"
          echo "Major tag: $MAJOR_TAG"

      - name: Update major version tag
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git tag -fa "${{ steps.version.outputs.major_tag }}" \
            "${{ steps.version.outputs.full_tag }}" \
            -m "Update ${{ steps.version.outputs.major_tag }}"

          git push origin \
            "${{ steps.version.outputs.major_tag }}" \
            --force

      - name: Summary
        shell: bash
        run: |
          echo "Updated major version tag:"
          echo "  ${{ steps.version.outputs.major_tag }}"
          echo "to point to:"
          echo "  ${{ steps.version.outputs.full_tag }}"
